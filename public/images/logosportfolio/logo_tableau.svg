<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Tableau: cross/plus grid of bars -->
  <g fill="#A06700">
    <!-- Center vertical bar -->
    <rect x="60" y="20" width="8" height="88" rx="2"/>
    <!-- Center horizontal bar -->
    <rect x="20" y="60" width="88" height="8" rx="2"/>
    <!-- Top-left small cross -->
    <rect x="28" y="34" width="5" height="26" rx="1.5"/>
    <rect x="18" y="44" width="26" height="5" rx="1.5"/>
    <!-- Top-right small cross -->
    <rect x="95" y="34" width="5" height="26" rx="1.5"/>
    <rect x="84" y="44" width="26" height="5" rx="1.5"/>
    <!-- Bottom-left small cross -->
    <rect x="28" y="68" width="5" height="26" rx="1.5"/>
    <rect x="18" y="78" width="26" height="5" rx="1.5"/>
    <!-- Bottom-right small cross -->
    <rect x="95" y="68" width="5" height="26" rx="1.5"/>
    <rect x="84" y="78" width="26" height="5" rx="1.5"/>
  </g>
</svg>
